name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set GitHub Pages environment variables
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_name="${GITHUB_REPOSITORY%%/*}"

          if [ "$repo_name" = "${owner_name}.github.io" ]; then
            echo "PAGES_BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "PAGES_BASE_PATH=/$repo_name" >> "$GITHUB_ENV"
          fi

          echo "GITHUB_PAGES=true" >> "$GITHUB_ENV"

      - name: Disable route handlers for static export
        run: |
          if [ -d app/api ]; then
            mv app/api _app_api_disabled
          fi

      - name: Install dependencies
        run: npm ci

      - name: Clean Next build artifacts
        run: rm -rf .next out

      - name: Build static site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
